<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>

  <!-- Global CSS -->
  <link rel="stylesheet" href="assets/style/global.css" />

  <link rel="stylesheet" href="assets/style/bars.css" />
  <link rel="stylesheet" href="assets/style/clock.css" />
  <link rel="stylesheet" href="assets/style/shortcuts.css" />
  <link rel="stylesheet" href="assets/style/greeting.css" />
  <link rel="stylesheet" href="assets/style/weather.css" />
  <link rel="stylesheet" href="assets/style/settings.css" />

  <!-- Fontawesome -->
  <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
</head>

<body>

  <div id="bars-container">

    <!-- insert by bars.js -->

  </div>

  <section class="container">

    <div id="clock-container">

      <!-- insert by clock.js -->

    </div>

  </section>

  <section class="container">

    <div class="presentation-container">

      <h1 id="greeting">

        <!-- insert by greeting.js -->

      </h1>
      <p id="weather">

        <!-- insert by whether.js -->

      </p>

    </div>

    <div class="shortcuts-container" id="shortcuts-container">

      <!-- insert by shortcuts.js -->

    </div>

  </section>

  <button id="settings-button">
    <i class="fa-solid fa-gear"></i>
    <span class="settings-text" data-i18n="settings_btn">Settings</span>
  </button>

  <div id="settingsDivContainer" style="display: none;">
    <div id="settingsDiv">
      <section id="settingsHeader">
        <h2 data-i18n="settings_title">Configurações</h2>
        <button id="close-settings" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
      </section>

      <div class="settings-scroll">
        <!-- Configurações Gerais -->
        <section class="settings-section">
          <div class="settingsItemTittle collapsible-tittle" data-section="general">
            <span data-i18n="settings_general">Geral</span>
            <i class="fa-solid fa-chevron-up"></i>
          </div>
          <div class="collapsible-content">
            <div class="settingsItem input-group">
              <label for="settingsName" data-i18n="label_name">Nome</label>
              <input type="text" id="settingsName" data-i18n-placeholder="placeholder_name" placeholder="Seu nome" class="settings-input">
            </div>
            
            <div class="settingsItem input-group">
              <label for="settingsApiKey" data-i18n="label_apikey">API Key (OpenWeatherMap)</label>
              <div class="password-input-wrapper">
                <input type="password" id="settingsApiKey" data-i18n-placeholder="placeholder_apikey" placeholder="Sua API Key" class="settings-input">
                <button type="button" id="toggleApiKeyVisibility" class="toggle-password-btn" title="Mostrar/Ocultar">
                  <i class="fa-solid fa-eye" id="eyeIcon"></i>
                </button>
              </div>
            </div>
            
            <div class="settingsItem input-group">
              <label for="settingsCity" data-i18n="label_city">Cidade</label>
              <input type="text" id="settingsCity" data-i18n-placeholder="placeholder_city" placeholder="Ex: São Paulo" class="settings-input">
            </div>

            <div class="settingsItem input-group">
              <label data-i18n="label_unit">Unidade</label>
              <div class="custom-select" id="settingsUnits" data-storage-key="units">
                <div class="select-trigger">
                  <span class="selected-text">Celsius (°C)</span>
                  <i class="fa-solid fa-chevron-down"></i>
                </div>
                <div class="select-options">
                  <div class="select-option" data-value="metric">Celsius (°C)</div>
                  <div class="select-option" data-value="imperial">Fahrenheit (°F)</div>
                </div>
              </div>
            </div>

            <div class="settingsItem input-group">
              <label data-i18n="label_lang">Idioma</label>
              <div class="custom-select" id="settingsLang" data-storage-key="lang">
                <div class="select-trigger">
                  <span class="selected-text">Português</span>
                  <i class="fa-solid fa-chevron-down"></i>
                </div>
                <div class="select-options">
                  <div class="select-option" data-value="pt_br">Português</div>
                  <div class="select-option" data-value="en">English</div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- Visibilidade -->
        <section class="settings-section">
          <div class="settingsItemTittle collapsible-tittle" data-section="visibility">
            <span data-i18n="settings_visibility">Visibilidade</span>
            <i class="fa-solid fa-chevron-up"></i>
          </div>
          
          <div class="collapsible-content">
            <div class="settingsItem-group">
              <div class="settingsItem">
                <span class="settingsItemText" data-i18n="visibility_clock">Relógio</span>
                <label class="switch">
                  <input type="checkbox" id="settingsClock">
                  <span class="slider"></span>
                </label>
              </div>

              <div class="settingsItem sub-item" id="settingsDateContainer">
                <span class="settingsItemText" data-i18n="visibility_date">Data</span>
                <label class="switch">
                  <input type="checkbox" id="settingsDate">
                  <span class="slider"></span>
                </label>
              </div>
            </div>

            <div class="settingsItem">
              <span class="settingsItemText" data-i18n="visibility_greeting">Saudação</span>
              <label class="switch">
                <input type="checkbox" id="settingsGreeting">
                <span class="slider"></span>
              </label>
            </div>

            <div class="settingsItem">
              <span class="settingsItemText" data-i18n="visibility_weather">Clima</span>
              <label class="switch">
                <input type="checkbox" id="settingsWeather">
                <span class="slider"></span>
              </label>
            </div>

            <div class="settingsItem">
              <span class="settingsItemText" data-i18n="visibility_links">Links Rápidos</span>
              <label class="switch">
                <input type="checkbox" id="settingsLinks">
                <span class="slider"></span>
              </label>
            </div>

            <div class="settingsItem">
              <span class="settingsItemText" data-i18n="visibility_settings_btn">Botão Settings</span>
              <label class="switch">
                <input type="checkbox" id="settingsShowSettingsBtn">
                <span class="slider"></span>
              </label>
            </div>
          </div>
        </section>

        <!-- Links (CRUD) -->
        <section class="settings-section">
          <div class="settingsItemTittle collapsible-tittle" data-section="links">
            <span data-i18n="settings_links">Links Rápidos</span>
            <i class="fa-solid fa-chevron-up"></i>
          </div>
          <div class="collapsible-content">
            <div class="settingsItem link-manager-container">
              <div id="link-form-container" class="link-form-container" style="display: none;">
                <div class="link-form-header">
                  <span id="link-form-title" data-i18n="link_new_title">Novo Link</span>
                  <button type="button" id="close-link-form-btn" class="close-form-btn"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <form id="link-manager-form" class="link-manager-form">
                  <input type="text" id="linkName" data-i18n-placeholder="placeholder_link_name" placeholder="Nome (Ex: GitHub)" class="settings-input" required>
                  <input type="text" id="linkUrl" data-i18n-placeholder="placeholder_link_url" placeholder="URL (Ex: github.com)" class="settings-input" required>
                  <button type="submit" id="add-link-btn" class="settings-btn" data-i18n="btn_add">Adicionar</button>
                </form>
              </div>
              
              <button type="button" id="toggle-add-link-form-btn" class="settings-btn toggle-add-btn">
                <i class="fa-solid fa-plus"></i> <span data-i18n="btn_add_new">Adicionar Novo</span>
              </button>
              
              <div id="link-manager-list" class="link-manager-list"></div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <footer>
    <a href="http://github.com/lpatros" class="link-footer"><span data-i18n="footer_created_by">created by </span><span id="footer-user-name">@lpatros</span></a>
  </footer>

</body>

<!-- <script src="./assets/js/bars.js"></script> -->
<!-- <script src="assets/js/theme.js"></script> -->
<script src="./assets/js/lang.js"></script>
<script src="./assets/js/clock.js"></script>
<script src="./assets/js/greeting.js"></script>
<script src="./assets/js/weather.js"></script>
<script src="./assets/js/shortcuts.js"></script>
<script src="./assets/js/settings.js"></script>

</html>
