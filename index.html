<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Aba</title>

  <!-- Global CSS -->
  <link rel="stylesheet" href="assets/style/global.css" />

  <!-- favicon -->
  <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">

  <!-- Fontawesome -->
  <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
</head>

<body>
  <div class="theme-switch-wrapper">
    <label class="theme-switch" for="button">
      <button class="theme-switch-button" aria-label="Alternar tema" onclick="switchTheme()">
        <i class="fa-regular fa-moon fa-2xl" id="toogle-theme"></i>
      </button>
  </div>
  </label>
  </div>

  <div class="clock-container container">
    <div id="time"></div>
    <div id="date"></div>
  </div>
  <div class="container">

    <form action="https://www.google.com/search" method="get" target="_blank">
      <div class="search-bar-container">
        <span class="search-icon">
          <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20px" height="20px">
            <path
              d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z">
            </path>
          </svg>
        </span>
        <input class="search-input w-500" type="text" name="q" aria-label="Pesquisar no Google"
          placeholder="Pesquisar no Google" />
      </div>
    </form>

    <div class="shortcuts-container">
      <a href="https://gemini.google.com/app" class="shortcut" title="Gemini">
        <div class="shortcut-icon-container">
          <img src="assets/icons/gemini_icon.png" class="shortcut-icon" alt="Gemini icon">
        </div>
        <span class="shortcut-label">Gemini</span>
      </a>

      <a href="https://mail.google.com" class="shortcut" title="Gmail">
        <div class="shortcut-icon-container">
          <img src="assets/icons/Gmail_icon_(2020).svg.png" class="shortcut-icon" alt="Gmail icon">
        </div>
        <span class="shortcut-label">Gmail</span>
      </a>

      <a href="https://www.youtube.com" class="shortcut" title="YouTube">
        <div class="shortcut-icon-container">
          <i class="fa-brands fa-youtube fa-xl" style="color: #ff2e2e;"></i>
        </div>
        <span class="shortcut-label">YouTube</span>
      </a>

      <a href="https://www.github.com" class="shortcut" title="GitHub">
        <div class="shortcut-icon-container">
          <i class="fa-brands fa-github fa-xl"></i>
        </div>
        <span class="shortcut-label">GitHub</span>
      </a>
    </div>
  </div>

  <footer><a href="http://github.com/lpatros" class="link-footer">@lpatros</a></footer>
</body>
<script src="assets/js/theme.js"></script>
<script src="assets/js/clock.js"></script>

</html>
